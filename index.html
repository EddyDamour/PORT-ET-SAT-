<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVUASU - PORT-PAROLE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #1A1A1A; 
            --panel-bg: #2A2A2A;
            --text-primary: #E0E0E0; 
            --text-secondary: #999999;
            --accent-yellow: #F4D03F; 
            --danger: #E57373; 
            --success: #81C784; 
        }
        
        body { 
            background: var(--bg); 
            color: var(--text-primary);
            font-family: 'Inter', system-ui, sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            box-sizing: border-box;
            overflow: hidden;
        }
        
        h1 { 
            font-size: 1.3rem; 
            text-align: center; 
            letter-spacing: 2px; 
            color: var(--accent-yellow);
            border-bottom: 1px solid #333;
            padding-bottom: 15px; 
            margin-top: 0;
            font-weight: 700;
        }
        
        #connection-zone { 
            background: var(--panel-bg); 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 15px;
            text-align: center; 
            border: 1px solid #333; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        #status { 
            font-weight: 700; 
            margin-bottom: 10px;
            display: block; 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }
        .status-off { color: var(--danger); }
        .status-on { color: var(--success); }
        .status-wait { color: var(--text-secondary); }

        /* Style pour l'ID texte */
        #id-label {
            font-size: 0.8rem; 
            color: var(--text-secondary); 
            margin-top: 5px;
        }
        #peer-id-display { 
            font-family: 'Inter', monospace; 
            font-size: 1.2rem; 
            color: var(--accent-yellow); 
            background: var(--bg);
            padding: 8px 16px; 
            border-radius: 6px; 
            display: inline-block; 
            margin-top: 5px; 
            margin-bottom: 10px;
            font-weight: 600;
            border: 1px solid #444;
        }
        
        /* Conteneur du QR Code */
        #qrcode-container {
            background: white;
            padding: 10px;
            border-radius: 8px;
            margin-top: 5px;
            display: none;
        }
        
        .hint { 
            font-size: 0.8rem; 
            color: var(--text-secondary); 
            margin-top: 10px;
        }
        
        #transcript-container { 
            flex: 1;
            background: var(--panel-bg);
            border-radius: 12px;
            padding: 20px; 
            overflow-y: auto; 
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
        }
        
        #transcript {
            font-size: 1.3rem; 
            line-height: 1.5;
            color: var(--accent-yellow);
            font-weight: 400;
        }
        
        #transcript i { 
            opacity: 0.6; 
            font-style: normal; 
            color: var(--text-secondary);
        }
        
        .controls {
            text-align: center;
            padding-top: 15px;
            padding-bottom: 10px;
        }
        
        #main-btn { 
            width: 75px; 
            height: 75px;
            border-radius: 50%; 
            border: 2px solid var(--accent-yellow); 
            font-weight: 600; 
            cursor: pointer; 
            background: var(--bg); 
            color: var(--accent-yellow); 
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 1px;
            transition: all 0.3s ease; 
        }
        
        #main-btn.recording { 
            background: rgba(229, 115, 115, 0.1);
            border-color: var(--danger);
            color: var(--danger);
        }
        
        #main-btn:disabled { 
            border-color: #444;
            color: #666;
            background: transparent;
            cursor: not-allowed; 
        }
    </style>
</head>
<body>
    <h1>AVUASU - PORT-PAROLE</h1>

    <div id="connection-zone">
        <span id="status" class="status-wait">Génération du lien...</span>
        
        <div id="id-label">ID DE CONNEXION :</div>
        <span id="peer-id-display">...</span>
        
        <div id="qrcode-container"></div>
        
        <div class="hint" id="hint-text">Scannez le QR Code ou entrez l'ID sur le Satellite</div>
    </div>

    <div id="transcript-container">
        <div id="transcript">En attente de connexion satellite...</div>
    </div>

    <div class="controls">
        <button id="main-btn" onclick="toggleTranscription()" disabled>MICRO</button>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <script>
        const statusEl = document.getElementById('status');
        const peerIdEl = document.getElementById('peer-id-display');
        const idLabel = document.getElementById('id-label');
        const qrcodeContainer = document.getElementById('qrcode-container');
        const hintText = document.getElementById('hint-text');
        const transcriptEl = document.getElementById('transcript');
        const btnEl = document.getElementById('main-btn');
        
        let peer = new Peer({ debug: 2 }); 
        let conn = null; 
        let isRecording = false;
        
        peer.on('open', (id) => { 
            statusEl.innerText = "En attente du satellite"; 
            statusEl.className = "status-wait"; 
            
            // Affichage de l'ID texte
            peerIdEl.innerText = id;
            
            // Génération de l'URL magique
            const currentUrl = window.location.href.split('?')[0];
            const basePath = currentUrl.substring(0, currentUrl.lastIndexOf('/'));
            const satelliteUrl = `${basePath}/satellite.html?id=${id}`;
            
            // Création du QR Code
            qrcodeContainer.style.display = "block";
            new QRCode(qrcodeContainer, {
                text: satelliteUrl,
                width: 140,
                height: 140,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.L
            });
        });

        peer.on('error', (err) => {
            console.error(err);
            statusEl.innerText = "ERREUR RÉSEAU";
            statusEl.className = "status-off";
            peerIdEl.innerText = "ÉCHEC";
            hintText.innerText = err.type;
        });
        
        peer.on('connection', (connection) => {
            conn = connection;
            
            // Masquer les infos de connexion quand le satellite est lié
            qrcodeContainer.style.display = "none";
            peerIdEl.style.display = "none";
            idLabel.style.display = "none";
            hintText.style.display = "none";
            
            statusEl.innerText = "SATELLITE CONNECTÉ";
            statusEl.className = "status-on";
            btnEl.disabled = false;
            transcriptEl.innerHTML = "Système sécurisé prêt. Appuyez sur le micro pour parler.";
            
            conn.on('close', () => { 
                statusEl.innerText = "SATELLITE DÉCONNECTÉ"; 
                statusEl.className = "status-off"; 
                btnEl.disabled = true; 
                if (isRecording) stopTranscription(); 
                
                // Réafficher les infos de connexion
                qrcodeContainer.style.display = "block";
                peerIdEl.style.display = "inline-block";
                idLabel.style.display = "block";
                hintText.style.display = "block";
            });
        });

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'fr-FR'; 
        recognition.continuous = true; 
        recognition.interimResults = true;
        
        function toggleTranscription() { 
            if (isRecording) stopTranscription(); 
            else startTranscription();
        }
        
        function startTranscription() { 
            transcriptEl.innerHTML = "..."; 
            recognition.start();
        }
        function stopTranscription() { recognition.stop(); }

        recognition.onstart = () => { 
            isRecording = true; 
            btnEl.classList.add('recording'); 
            btnEl.innerText = "STOP";
        };
        
        recognition.onresult = (event) => {
            let final = '';
            let interim = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) final += event.results[i][0].transcript;
                else interim += event.results[i][0].transcript;
            }
            transcriptEl.innerHTML = `<div>${final} <i>${interim}</i></div>`;
            if (conn && conn.open) conn.send({ type: 'trans', final: final, interim: interim });
        };
        
        recognition.onend = () => { 
            isRecording = false; 
            btnEl.classList.remove('recording');
            btnEl.innerText = "MICRO"; 
        };
    </script>
</body>
</html>
